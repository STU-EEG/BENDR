Configuratron:
  preload: True

datasets:
  tueg:
    data_max: 3276.7
    data_min: -1583.9258304722666
    toplevel: data/tueg_demo
    tlen: 3
    rename_channels:
      CP3: "*C3P*"
      CP4: "*C4P*"
      FT9: "*T1*"
      FT10: "*T2*"
    exclude_channels: !include configs/tueg_channel_exclusions.yml
    picks:
      - eeg
    lr: 0.0001

encoder_weights: pretrained_weights/encoder.pt
context_weights: pretrained_weights/contextualizer.pt